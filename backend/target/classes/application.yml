# DebugSync Backend — Application Configuration
# -----------------------------------------------

server:
  port: 8080
  error:
    include-message: always
    include-exception: true

spring:
  application:
    name: DebugSync

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # H2 in-memory database (swap to PostgreSQL for production)
  datasource:
    url: jdbc:h2:file:./data/debugsync;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate settings
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  # H2 console (for debugging, access at /h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

# Custom DebugSync configuration
debugsync:
  ai:
    openrouter-api-key: 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
  cors:
    allowed-origins: http://localhost:5173
  git:
    workspace-root: ./git-workspaces
    timeout-seconds: 30
